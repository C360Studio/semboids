# SemBoids Revive Configuration
# Copied from semstreams so lint gates stay identical across the sem* family.

ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
# warningCode = 1 enforces the CLAUDE.md policy "revive (warnings = failure)".
warningCode = 1

[rule.blank-imports]
[rule.context-as-argument]
[rule.context-keys-type]
[rule.dot-imports]
[rule.error-return]
[rule.error-strings]
[rule.error-naming]
[rule.exported]
[rule.if-return]
[rule.increment-decrement]
[rule.var-naming]
[rule.var-declaration]
[rule.package-comments]
[rule.range]
[rule.receiver-naming]
[rule.time-naming]
[rule.unexported-return]
[rule.indent-error-flow]
[rule.errorf]
[rule.empty-block]
[rule.superfluous-else]
[rule.unused-parameter]
[rule.unreachable-code]
[rule.redefines-builtin-id]

# Disabled: Line length checks can be overly restrictive for struct tags
# [rule.line-length-limit]
#   arguments = [120]

# function-length: arguments = [maxStatements, maxLines]; 0 disables the
# corresponding check. Prior config of [50, 0] was too strict for
# scenario-based test functions that exercise a full flow with setup +
# dispatch + assertions inline (e.g. TestHandleToolsComplete_FullConversationHistory
# at 56 statements). Bumped to 80 statements to accommodate the
# canonical scenario-test shape; production code rarely needs >50 in a
# single function and the rule still flags genuinely-too-long methods.
# Line-count check kept disabled via 0.
[rule.function-length]
  arguments = [80, 0]

[rule.max-public-structs]
  arguments = [10]
  # E2E test infrastructure has many DTOs for structured results
  # Agentic packages have multiple coordinating types by design
  exclude = ["**/test/e2e/**", "**/agentic/**"]
