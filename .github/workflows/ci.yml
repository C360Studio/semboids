name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          UNFORMATTED=$(git ls-files -z '*.go' | xargs -0 gofmt -l)
          if [ -n "$UNFORMATTED" ]; then
            echo "gofmt needed on:"; echo "$UNFORMATTED"; exit 1
          fi
      - name: revive (warnings = failure)
        run: go tool revive -config revive.toml -formatter friendly -exclude ui/... ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Pull NATS image for integration tests
        run: docker pull nats:2.12-alpine
      - name: Unit tests (race)
        run: go test -v -race ./...
      - name: Integration tests (race)
        run: go test -tags=integration -v -race ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cross-compile
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s -X main.version=${{ github.sha }}" -o semboids-linux-amd64 ./cmd/semboids

  # schema-validation job deferred until a schema exists (see
  # openspec/changes/add-flock-core/tasks.md 1.4)

  status-check:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more jobs failed"; exit 1
          fi
          echo "All jobs passed"
